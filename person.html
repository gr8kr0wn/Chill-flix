      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      themeToggle.innerHTML = dark 
        ? '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
        : '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      localStorage.setItem('chillflix-theme', dark ? 'dark' : 'light');
    }

    themeToggle.addEventListener('click', () => applyTheme(!isDark));

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function fetchFromTMDB(endpoint, params = {}) {
      const url = new URL(`${TMDB_BASE_URL}${endpoint}`);
      url.searchParams.append('api_key', TMDB_API_KEY);
      Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v));
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`TMDB error: ${response.status}`);
        return await response.json();
      } catch (e) { console.error('Fetch failed:', e); return null; }
    }

    function getImageUrl(path, size = PROFILE_SIZE) {
      if (!path) return '';
      return `${TMDB_IMAGE_BASE}${size}${path}`;
    }

    function calculateAge(birthday) {
      if (!birthday) return null;
      const birth = new Date(birthday);
      const today = new Date();
      let age = today.getFullYear() - birth.getFullYear();
      const m = today.getMonth() - birth.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
      return age;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function loadPersonDetails() {
      const data = await fetchFromTMDB(`/person/${personId}`, { language: 'en-US', append_to_response: 'external_ids' });
      if (!data) return;
      personData = data;

      const profileUrl = getImageUrl(data.profile_path);
      const age = calculateAge(data.birthday);
      const birthplace = data.place_of_birth || 'Unknown';
      const knownFor = data.known_for_department || 'Acting';
      const alsoKnownAs = data.also_known_as?.length ? data.also_known_as.slice(0, 2).join(', ') : '';

      const externalIds = data.external_ids || {};
      const imdbUrl = externalIds.imdb_id ? `https://www.imdb.com/name/${externalIds.imdb_id}` : null;
      const instagramUrl = externalIds.instagram_id ? `https://www.instagram.com/${externalIds.instagram_id}` : null;

      document.getElementById('personHeader').innerHTML = `
        <div class="profile-image-container">
          <div class="profile-image">
            ${profileUrl ? `<img src="${profileUrl}" alt="${data.name}">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--card);">🎭</div>'}
          </div>
        </div>
        <div class="profile-info">
          <h1 class="person-name">${data.name}</h1>
          <div class="person-meta">
            <span class="meta-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${knownFor}</span>
            ${age ? `<span class="meta-item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${age} years old</span>` : ''}
            <span class="meta-item"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>${birthplace}</span>
          </div>
          <div class="person-biography" id="bioContainer">
            <div class="bio-truncated" id="bioText">${data.biography || 'No biography available.'}</div>
            ${data.biography && data.biography.length > 300 ? '<button class="read-more-btn" id="readMoreBtn" onclick="toggleBio()">Read More</button>' : ''}
          </div>
          <div class="personal-details">
            ${data.birthday ? `<div class="detail-item"><span class="detail-label">Born</span><span class="detail-value">${formatDate(data.birthday)}</span></div>` : ''}
            ${data.place_of_birth ? `<div class="detail-item"><span class="detail-label">Birthplace</span><span class="detail-value">${data.place_of_birth}</span></div>` : ''}
            ${alsoKnownAs ? `<div class="detail-item"><span class="detail-label">Also Known As</span><span class="detail-value">${alsoKnownAs}</span></div>` : ''}
          </div>
          <div class="external-links">
            ${imdbUrl ? `<a href="${imdbUrl}" target="_blank" class="external-link">IMDb</a>` : ''}
            ${instagramUrl ? `<a href="${instagramUrl}" target="_blank" class="external-link">Instagram</a>` : ''}
          </div>
        </div>
      `;
    }

    window.toggleBio = function() {
      const bioText = document.getElementById('bioText');
      const btn = document.getElementById('readMoreBtn');
      if (bioText.classList.contains('bio-truncated')) {
        bioText.classList.remove('bio-truncated');
        bioText.classList.add('bio-expanded');
        btn.textContent = 'Show Less';
      } else {
        bioText.classList.add('bio-truncated');
        bioText.classList.remove('bio-expanded');
        btn.textContent = 'Read More';
      }
    };

    async function loadCredits() {
      const data = await fetchFromTMDB(`/person/${personId}/combined_credits`, { language: 'en-US' });
      if (!data || !data.cast) return;
      
      combinedCredits = data.cast
        .filter(item => item.media_type === 'movie')
        .sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
      
      document.getElementById('knownForSection').style.display = 'block';
      renderFilmography();
    }

    function renderFilmography() {
      const scroll = document.getElementById('filmographyScroll');
      let credits = combinedCredits;
      
      if (currentDepartment === 'acting') {
        credits = credits.filter(c => c.character);
      }
      
      credits = credits.slice(0, 20);

      if (credits.length === 0) {
        scroll.innerHTML = '<div class="empty-state">No credits found</div>';
        return;
      }

      scroll.innerHTML = credits.map(movie => {
        const posterUrl = getImageUrl(movie.poster_path, POSTER_SIZE);
        const year = movie.release_date ? movie.release_date.substring(0, 4) : 'TBD';
        const rating = movie.vote_average ? movie.vote_average.toFixed(1) : '0.0';
        
        return `
          <a href="movie.html?id=${movie.id}" class="movie-card">
            <div class="movie-poster">
              ${posterUrl ? `<img src="${posterUrl}" alt="${movie.title}">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--card);">🎬</div>'}
            </div>
            <div class="movie-title">${movie.title}</div>
            ${movie.character ? `<div class="movie-character">as ${movie.character}</div>` : ''}
            <div class="movie-year">${year} · ★ ${rating}</div>
          </a>
        `;
      }).join('');
    }

    window.filterFilmography = function(dept) {
      currentDepartment = dept;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      document.querySelector(`.filter-pill[data-department="${dept}"]`).classList.add('active');
      renderFilmography();
    };

    async function loadImages() {
      const data = await fetchFromTMDB(`/person/${personId}/images`);
      if (!data || !data.profiles) return;
      
      allImages = data.profiles.slice(0, 15);
      if (allImages.length === 0) return;
      
      document.getElementById('gallerySection').style.display = 'block';
      document.getElementById('galleryScroll').innerHTML = allImages.map(img => {
        const imageUrl = getImageUrl(img.file_path, GALLERY_SIZE);
        return `
          <div class="gallery-image" onclick="window.open('${getImageUrl(img.file_path, 'original')}', '_blank')">
            <img src="${imageUrl}" alt="Gallery image">
          </div>
        `;
      }).join('');
    }

    (async function init() {
      const savedTheme = localStorage.getItem('chillflix-theme');
      applyTheme(savedTheme ? savedTheme === 'dark' : true);
      updateProfileUI();
      
      await Promise.all([
        loadPersonDetails(),
        loadCredits(),
        loadImages()
      ]);
    })();
  </script>
</body>
</html>
