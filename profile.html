    :root,
    [data-theme="dark"] {
      --bg:         #0a0a0f;
      --surface:    #0e0e18;
      --card:       #141420;
      --card-hov:   #1c1c2e;
      --border:     rgba(255,255,255,0.09);
      --border-mid: rgba(255,255,255,0.15);
      --text:       #ffffff;
      --muted:      #8a8aaa;
      --muted2:     rgba(255,255,255,0.35);
      --red:        #e50914;
      --red-hov:    #f40612;
      --nav-bg:     rgba(10,10,15,0.92);
      --sidebar-bg: #0d0d14;
      --pill-bg:    rgba(255,255,255,0.06);
      --pill-hov:   rgba(255,255,255,0.12);
      --logo-chill: #ffffff;
      --bottom-nav-bg: rgba(10,10,15,0.95);
      --gold:       #fbbf24;
      --gold-grad:  linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
      --success:    #22c55e;
    }

    [data-theme="light"] {
      --bg:         #f5f5f8;
      --surface:    #ebebf2;
      --card:       #ffffff;
      --card-hov:   #f0f0f7;
      --border:     rgba(0,0,0,0.10);
      --border-mid: rgba(0,0,0,0.18);
      --text:       #0f0f1a;
      --muted:      #6b6b85;
      --muted2:     rgba(15,15,26,0.40);
      --red:        #e50914;
      --red-hov:    #c00710;
      --nav-bg:     rgba(245,245,248,0.92);
      --sidebar-bg: #ebebf2;
      --pill-bg:    rgba(0,0,0,0.05);
      --pill-hov:   rgba(0,0,0,0.10);
      --logo-chill: #0f0f1a;
      --bottom-nav-bg: rgba(245,245,248,0.95);
      --gold:       #d97706;
      --gold-grad:  linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
      --success:    #16a34a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.4s, color 0.4s;
    }

    .logo-text {
      font-family: 'Bebas Neue', 'Impact', sans-serif;
      letter-spacing: 0.02em;
      line-height: 1;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }

    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 40;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--nav-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: background 0.4s, border-color 0.4s;
    }

    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .hamburger {
      width: 40px; height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text);
      background: transparent;
      border: none;
      transition: background 0.2s;
    }
    .hamburger:hover { background: var(--pill-bg); }
    .hamburger svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2; fill: none; }

    .logo-link { font-size: 24px; text-decoration: none; }
    .logo-link .chill { color: var(--logo-chill); transition: color 0.4s; }
    .logo-link .flix  { color: var(--red); }

    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .theme-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .theme-btn:hover { border-color: var(--red); background: rgba(229,9,20,0.08); }
    .theme-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; }

    .profile-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--red);
      color: white;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
      text-decoration: none;
    }
    .profile-btn:hover { background: var(--red-hov); }

    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 29;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      opacity: 0;
      transition: opacity 0.3s;
    }
    #sidebar-overlay.visible { display: block; }
    #sidebar-overlay.faded { opacity: 1; }

    #sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      z-index: 30;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), background 0.4s;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }
    #sidebar.expanded { transform: translateX(0); }

    .sidebar-header {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-nav { padding: 12px 0; flex: 1; }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover { background: var(--pill-bg); color: var(--text); }
    .sidebar-item.active {
      color: var(--red);
      border-left-color: var(--red);
      background: rgba(229,9,20,0.08);
    }
    .sidebar-item svg {
      width: 22px; height: 22px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      flex-shrink: 0;
    }
    .sidebar-divider { height: 1px; background: var(--border); margin: 12px 16px; }
    .sidebar-footer { margin-top: auto; }
    .sidebar-item.logout { color: #e50914; }

    #main-content {
      margin-left: 0;
      margin-top: 60px;
      padding: 24px 28px;
      min-height: calc(100vh - 60px);
      max-width: 1000px;
    }

    .page-header { margin-bottom: 32px; }
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.03em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .page-title svg { width: 32px; height: 32px; stroke: var(--red); stroke-width: 1.8; fill: none; }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 32px;
      padding: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
    }
    @media (max-width: 640px) { .profile-header { flex-direction: column; text-align: center; } }

    .avatar-large {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .profile-info { flex: 1; }
    .profile-name { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--text); margin-bottom: 4px; }
    .profile-email { font-size: 14px; color: var(--muted); margin-bottom: 12px; }

    .plan-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
    }
    .plan-badge.free { background: var(--pill-bg); color: var(--muted); border: 1px solid var(--border); }
    .plan-badge.premium { background: var(--gold-grad); color: #0a0a0f; }
    .plan-badge svg { width: 14px; height: 14px; fill: currentColor; }

    .edit-profile-btn {
      padding: 10px 20px;
      border-radius: 30px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
      margin-top: 12px;
    }
    .edit-profile-btn:hover { background: var(--pill-bg); border-color: var(--border-mid); }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
    .stat-icon {
      width: 40px; height: 40px;
      margin: 0 auto 12px;
      background: rgba(229,9,20,0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stat-icon svg { width: 22px; height: 22px; stroke: var(--red); stroke-width: 1.8; fill: none; }
    .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--text); margin-bottom: 4px; }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      color: var(--text);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title svg { width: 24px; height: 24px; stroke: var(--red); stroke-width: 1.8; }

    .continue-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    @media (max-width: 768px) { .continue-grid { grid-template-columns: repeat(2, 1fr); } }

    .continue-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
      text-decoration: none;

    .continue-card:hover { transform: translateY(-2px); }
    .continue-poster { aspect-ratio: 16/9; background: var(--card-hov); position: relative; }
    .continue-poster img { width: 100%; height: 100%; object-fit: cover; }
    .continue-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
      display: flex;
      align-items: flex-end;
      padding: 12px;
    }
    .progress-bar-small { width: 100%; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; }
    .progress-fill-small { height: 100%; background: var(--red); border-radius: 2px; }
    .continue-info { padding: 12px; }
    .continue-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .continue-progress { font-size: 12px; color: var(--muted); }
    .empty-continue { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--muted); }

    .activity-list {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 32px;
    }
    .activity-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
      cursor: pointer;
    }
    .activity-item:hover { background: var(--card-hov); }
    .activity-item:last-child { border-bottom: none; }
    .activity-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: rgba(229,9,20,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .activity-icon svg { width: 20px; height: 20px; stroke: var(--red); stroke-width: 1.8; }
    .activity-content { flex: 1; }
    .activity-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .activity-desc { font-size: 13px; color: var(--muted); }
    .activity-time { font-size: 12px; color: var(--muted2); }
    .empty-activity { text-align: center; padding: 40px; color: var(--muted); }

    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card);
      border: 1px solid var(--border-mid);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      z-index: 9999;
      transition: transform 0.4s;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: var(--bottom-nav-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      z-index: 50;
      padding: 0 16px;
      justify-content: space-around;
      align-items: center;
    }
    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
    }
    .bottom-nav-item.active { color: var(--red); }
    .bottom-nav-item svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.8; fill: none; }

    @media (max-width: 768px) {
      #main-content { padding: 16px; padding-bottom: 80px; }
      .bottom-nav { display: flex; }
      .hamburger { display: none; }
      .page-title { font-size: 28px; }
    }
    @media (min-width: 769px) { .bottom-nav { display: none; } }
  </style>
</head>

  <script>
    /* ═══════════════════════════════════════════════════
   PROTECTED ROUTE CHECK — Redirect if not logged in
════════════════════════════════════════════════════ */

(function checkAuth() {
  const isLoggedIn = localStorage.getItem('chillflix-logged-in') === 'true';
  
  // Public pages that don't require login
  const publicPages = ['index.html', 'auth.html', 'upgrade.html', 'error.html'];
  const currentPage = window.location.pathname.split('/').pop() || 'index.html';
  
  // If this is a public page, skip the check
  if (publicPages.includes(currentPage)) {
    return;
  }
  
  // If not logged in, redirect to auth page
  if (!isLoggedIn) {
    // Save the page they were trying to access
    sessionStorage.setItem('chillflix-redirect-after-login', window.location.href);
    window.location.href = 'auth.html';
  }
})();
    const TMDB_API_KEY = 'c619fb205a80d8c6c653895b7eae6f36';
    const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
    const TMDB_IMAGE_BASE = 'https://image.tmdb.org/t/p/';
    const POSTER_SIZE = 'w342';
    const BACKDROP_SIZE = 'w780';

    let isDark = true;
    let sidebarExpanded = false;

    const html = document.documentElement;
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const themeToggle = document.getElementById('themeToggle');
    const profileInitials = document.getElementById('profileInitials');
    const profileAvatar = document.getElementById('profileAvatar');
    const profileName = document.getElementById('profileName');
    const profileEmail = document.getElementById('profileEmail');
    const hamburgerBtn = document.getElementById('hamburgerBtn');

    function getHistory() { return JSON.parse(localStorage.getItem('chillflix-history') || '[]'); }
    function getWatchlist() { return JSON.parse(localStorage.getItem('chillflix-watchlist') || '[]'); }
    function getRatings() { return JSON.parse(localStorage.getItem('chillflix-ratings') || '{}'); }
    function getInProgress() { return JSON.parse(localStorage.getItem('chillflix-in-progress') || '[]'); }
    function getActivity() { return JSON.parse(localStorage.getItem('chillflix-activity') || '[]'); }
    function getProfile() {
      const saved = localStorage.getItem('chillflix-profile');
      return saved ? JSON.parse(saved) : { displayName: 'John Doe', email: 'john.doe@example.com' };
    }
    function isPremium() { return localStorage.getItem('chillflix-premium') === 'true'; }

    async function fetchFromTMDB(endpoint, params = {}) {
      const url = new URL(`${TMDB_BASE_URL}${endpoint}`);
      url.searchParams.append('api_key', TMDB_API_KEY);
      Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v));
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`TMDB error: ${response.status}`);
        return await response.json();
      } catch (e) { console.error('Fetch failed:', e); return null; }
    }

    async function fetchMovieDetails(movieId) { return await fetchFromTMDB(`/movie/${movieId}`, { language: 'en-US' }); }
    function getImageUrl(path, size = POSTER_SIZE) { return path ? `${TMDB_IMAGE_BASE}${size}${path}` : ''; }

    function applyTheme(dark) {
      isDark = dark;
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      themeToggle.innerHTML = dark 
        ? '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
        : '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      localStorage.setItem('chillflix-theme', dark ? 'dark' : 'light');
    }
    themeToggle.addEventListener('click', () => applyTheme(!isDark));

    function openSidebar() {
      sidebarExpanded = true;
      sidebar.classList.add('expanded');
      overlay.classList.add('visible');
      requestAnimationFrame(() => overlay.classList.add('faded'));
    }
    function closeSidebar() {
      if (!sidebarExpanded) return;
      sidebarExpanded = false;
      sidebar.classList.remove('expanded');
      overlay.classList.remove('faded');
      setTimeout(() => overlay.classList.remove('visible'), 300);
    }
    function toggleSidebar() { sidebarExpanded ? closeSidebar() : openSidebar(); }

    hamburgerBtn.addEventListener('click', toggleSidebar);
    overlay.addEventListener('click', closeSidebar);
    document.querySelectorAll('.sidebar-item').forEach(item => item.addEventListener('click', () => setTimeout(closeSidebar, 100)));
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });

    function updateStats() {
      const history = getHistory();
      const watchlist = getWatchlist();
      const ratings = getRatings();
      document.getElementById('moviesWatched').textContent = history.length;
      document.getElementById('watchlistCount').textContent = watchlist.length;
      document.getElementById('hoursWatched').textContent = Math.round(history.length * 2);
      const ratingValues = Object.values(ratings);
      document.getElementById('avgRating').textContent = ratingValues.length ? (ratingValues.reduce((a,b) => a+b, 0) / ratingValues.length).toFixed(1) : '0.0';
    }

    function updateProfileUI() {
      const profile = getProfile();
      const initials = profile.displayName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
      profileInitials.textContent = initials;
      profileAvatar.textContent = initials;
      profileName.textContent = profile.displayName;
      profileEmail.textContent = profile.email;
      const container = document.getElementById('planBadgeContainer');
      container.innerHTML = isPremium() 
        ? '<span class="plan-badge premium"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Premium Member</span>'
        : '<span class="plan-badge free">Free Plan</span>';
      updateStats();
    }

    async function renderContinueWatching() {
      const grid = document.getElementById('continueGrid');
      const inProgress = getInProgress().slice(0, 3);
      if (!inProgress.length) { grid.innerHTML = '<div class="empty-continue">Start watching movies to see them here!</div>'; return; }
      const cards = await Promise.all(inProgress.map(async (item) => {
        const movie = await fetchMovieDetails(item.movieId);
        if (!movie) return null;
        const backdropUrl = getImageUrl(movie.backdrop_path, BACKDROP_SIZE);
        const progressPercent = (item.progress / (movie.runtime * 60)) * 100;
        const remainingMinutes = Math.ceil(((movie.runtime * 60) - item.progress) / 60);
        return `<a href="watch.html?id=${movie.id}" class="continue-card"><div class="continue-poster">${backdropUrl ? `<img src="${backdropUrl}" alt="${movie.title}">` : ''}<div class="continue-overlay"><div class="progress-bar-small"><div class="progress-fill-small" style="width:${progressPercent}%;"></div></div></div></div><div class="continue-info"><div class="continue-title">${movie.title}</div><div class="continue-progress">${remainingMinutes} min remaining</div></div></a>`;
      }));
      grid.innerHTML = cards.filter(c => c).join('');
    }

    async function renderActivity() {
      const list = document.getElementById('activityList');
      const activity = getActivity().slice(0, 5).reverse();
      if (!activity.length) { list.innerHTML = '<div class="empty-activity">Your recent activity will appear here</div>'; return; }
      const items = await Promise.all(activity.map(async (item) => {
        const movie = await fetchMovieDetails(item.movieId);
        if (!movie) return null;
        const timeAgo = (() => {
          const seconds = Math.floor((new Date() - new Date(item.timestamp)) / 1000);
          if (seconds < 60) return 'Just now';
          if (seconds < 3600) return `${Math.floor(seconds / 60)} min ago`;
          if (seconds < 86400) return `${Math.floor(seconds / 3600)} hours ago`;
          return `${Math.floor(seconds / 86400)} days ago`;
        })();
        let icon, title, desc;
        if (item.type === 'watch') { icon = '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>'; title = `Watched ${movie.title}`; desc = `You watched ${Math.floor(item.progress / 60)}m of this movie`; }
        else if (item.type === 'watchlist') { icon = '<svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>'; title = `Added to Watchlist`; desc = movie.title; }
        else { icon = '<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'; title = `Rated ${movie.title}`; desc = `You gave ★ ${item.rating}/10`; }
        return `<div class="activity-item" onclick="window.location.href='movie.html?id=${movie.id}'"><div class="activity-icon">${icon}</div><div class="activity-content"><div class="activity-title">${title}</div><div class="activity-desc">${desc}</div></div><div class="activity-time">${timeAgo}</div></div>`;
      }));
      list.innerHTML = items.filter(i => i).join('');
    }

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    (async function init() {
      const savedTheme = localStorage.getItem('chillflix-theme');
      applyTheme(savedTheme ? savedTheme === 'dark' : true);
      updateProfileUI();
      if (!localStorage.getItem('chillflix-profile')) localStorage.setItem('chillflix-profile', JSON.stringify({ displayName: 'John Doe', email: 'john.doe@example.com' }));
      await Promise.all([renderContinueWatching(), renderActivity()]);
    })();
  </script>
