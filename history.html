  <style>
    /* ═══════════════════════════════════════════════════
       CHILLFLIX HISTORY — PRODUCTION READY

    ════════════════════════════════════════════════════ */

    :root,
    [data-theme="dark"] {
      --bg:         #0a0a0f;
      --surface:    #0e0e18;
      --card:       #141420;
      --card-hov:   #1c1c2e;
      --border:     rgba(255,255,255,0.09);
      --border-mid: rgba(255,255,255,0.15);
      --text:       #ffffff;
      --muted:      #8a8aaa;
      --muted2:     rgba(255,255,255,0.35);
      --red:        #e50914;
      --red-hov:    #f40612;
      --nav-bg:     rgba(10,10,15,0.92);
      --sidebar-bg: #0d0d14;
      --pill-bg:    rgba(255,255,255,0.06);
      --pill-hov:   rgba(255,255,255,0.12);
      --logo-chill: #ffffff;
      --bottom-nav-bg: rgba(10,10,15,0.95);
      --success:    #22c55e;
    }

    [data-theme="light"] {
      --bg:         #f5f5f8;
      --surface:    #ebebf2;
      --card:       #ffffff;
      --card-hov:   #f0f0f7;
      --border:     rgba(0,0,0,0.10);
      --border-mid: rgba(0,0,0,0.18);
      --text:       #0f0f1a;
      --muted:      #6b6b85;
      --muted2:     rgba(15,15,26,0.40);
      --red:        #e50914;
      --red-hov:    #c00710;
      --nav-bg:     rgba(245,245,248,0.92);
      --sidebar-bg: #ebebf2;
      --pill-bg:    rgba(0,0,0,0.05);
      --pill-hov:   rgba(0,0,0,0.10);
      --logo-chill: #0f0f1a;
      --bottom-nav-bg: rgba(245,245,248,0.95);
      --success:    #16a34a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.4s, color 0.4s;
    }

    .logo-text {
      font-family: 'Bebas Neue', 'Impact', sans-serif;
      letter-spacing: 0.02em;
      line-height: 1;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }

    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 40;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--nav-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: background 0.4s, border-color 0.4s;
    }

    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .hamburger {
      width: 40px; height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text);
      background: transparent;
      border: none;
      transition: background 0.2s;
    }
    .hamburger:hover { background: var(--pill-bg); }
    .hamburger svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2; fill: none; }

    .logo-link { font-size: 24px; text-decoration: none; }
    .logo-link .chill { color: var(--logo-chill); transition: color 0.4s; }
    .logo-link .flix  { color: var(--red); }

    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .theme-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .theme-btn:hover { border-color: var(--red); background: rgba(229,9,20,0.08); }
    .theme-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; }

    .profile-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--red);
      color: white;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
      text-decoration: none;
    }
    .profile-btn:hover { background: var(--red-hov); }

    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 29;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      opacity: 0;
      transition: opacity 0.3s;
    }
    #sidebar-overlay.visible { display: block; }
    #sidebar-overlay.faded { opacity: 1; }

    #sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      z-index: 30;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), background 0.4s;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }
    #sidebar.expanded { transform: translateX(0); }

    .sidebar-header {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-nav { padding: 12px 0; flex: 1; }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover { background: var(--pill-bg); color: var(--text); }
    .sidebar-item.active {
      color: var(--red);
      border-left-color: var(--red);
      background: rgba(229,9,20,0.08);
    }
    .sidebar-item svg {
      width: 22px; height: 22px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      flex-shrink: 0;
    }
    .sidebar-divider { height: 1px; background: var(--border); margin: 12px 16px; }
    .sidebar-footer { margin-top: auto; }
    .sidebar-item.logout { color: #e50914; }

    #main-content {
      margin-left: 0;
      margin-top: 60px;
      padding: 24px 28px;
      min-height: calc(100vh - 60px);
      max-width: 1200px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.03em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .page-title svg { width: 32px; height: 32px; stroke: var(--red); stroke-width: 1.8; fill: none; }

    .history-count {
      font-size: 14px;
      color: var(--muted);
      background: var(--card);
      padding: 6px 14px;
      border-radius: 30px;
      border: 1px solid var(--border);
    }

    .clear-all-btn {
      padding: 8px 18px;
      border-radius: 30px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-all-btn:hover { background: rgba(229,9,20,0.1); border-color: var(--red); color: var(--red); }

    /* History List */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .history-group {
      margin-bottom: 24px;
    }

    .history-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .history-date {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .history-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .history-item:hover {
      background: var(--card-hov);
      transform: translateX(4px);
    }

    .history-poster {
      width: 60px;
      height: 90px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .history-poster img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .history-info {
      flex: 1;
      min-width: 0;
    }

    .history-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
    }

    .history-progress {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-bar-small {
      width: 80px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill-small {
      height: 100%;
      background: var(--red);
      border-radius: 2px;
    }

    .history-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #fbbf24;
    }

    .history-rating svg {
      width: 12px; height: 12px;
      fill: #fbbf24;
    }

    .history-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .history-action-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .history-action-btn:hover {
      background: var(--red);
      border-color: var(--red);
      color: white;
    }
    .history-action-btn svg {
      width: 18px; height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-state svg {
      width: 80px; height: 80px;
      stroke: var(--muted);
      stroke-width: 1.5;
      fill: none;
      margin-bottom: 20px;
    }
    .empty-state h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--text);
      margin-bottom: 8px;
    }
    .empty-state p { font-size: 14px; margin-bottom: 24px; }

    .browse-btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 30px;
      background: var(--red);
      color: white;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s;
    }
    .browse-btn:hover { background: var(--red-hov); }

    .skeleton-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .skeleton-poster-small {
      width: 60px; height: 90px;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--card) 25%, var(--card-hov) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-info {
      flex: 1;
    }
    .skeleton-title-line {
      height: 16px; width: 200px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--card) 25%, var(--card-hov) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 8px;
    }
    .skeleton-meta-line {
      height: 12px; width: 120px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--card) 25%, var(--card-hov) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card);
      border: 1px solid var(--border-mid);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      z-index: 9999;
      transition: transform 0.4s;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: var(--bottom-nav-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      z-index: 50;
      padding: 0 16px;
      justify-content: space-around;
      align-items: center;
    }
    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
    }
    .bottom-nav-item.active { color: var(--red); }
    .bottom-nav-item svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.8; fill: none; }

    @media (max-width: 768px) {
      #main-content { padding: 16px; padding-bottom: 80px; }
      .bottom-nav { display: flex; }
      .hamburger { display: none; }
      .page-title { font-size: 28px; }
      .history-meta { flex-wrap: wrap; gap: 8px; }
      .history-actions { display: none; }
    }
    @media (min-width: 769px) {
      .bottom-nav { display: none; }
    }
  </style>
</head>

      <a href="index.html" class="sidebar-item logout">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span class="sidebar-label">Exit</span>
      </a>
    </div>
  </div>

  <div id="main-content">
    <div class="page-header">
      <h1 class="page-title">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Watch History
      </h1>
      <div style="display: flex; align-items: center; gap: 16px;">
        <span class="history-count" id="historyCount">0 movies</span>
        <button class="clear-all-btn" id="clearAllBtn" onclick="clearHistory()">Clear All</button>
      </div>
    </div>

    <div class="history-list" id="historyList">
      <div class="skeleton-item"><div class="skeleton-poster-small"></div><div class="skeleton-info"><div class="skeleton-title-line"></div><div class="skeleton-meta-line"></div></div></div>
      <div class="skeleton-item"><div class="skeleton-poster-small"></div><div class="skeleton-info"><div class="skeleton-title-line"></div><div class="skeleton-meta-line"></div></div></div>
      <div class="skeleton-item"><div class="skeleton-poster-small"></div><div class="skeleton-info"><div class="skeleton-title-line"></div><div class="skeleton-meta-line"></div></div></div>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="index.html" class="bottom-nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></a>
    <a href="search.html" class="bottom-nav-item"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>Search</span></a>
    <a href="movies.html" class="bottom-nav-item"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="8" y1="2" x2="8" y2="22"/><line x1="16" y1="2" x2="16" y2="22"/></svg><span>Movies</span></a>
    <a href="watchlist.html" class="bottom-nav-item"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span>Watchlist</span></a>
    <a href="profile.html" class="bottom-nav-item"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></a>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════
   PROTECTED ROUTE CHECK — Redirect if not logged in
════════════════════════════════════════════════════ */

(function checkAuth() {
  const isLoggedIn = localStorage.getItem('chillflix-logged-in') === 'true';
  
  // Public pages that don't require login
  const publicPages = ['index.html', 'auth.html', 'upgrade.html', 'error.html'];
  const currentPage = window.location.pathname.split('/').pop() || 'index.html';
  
  // If this is a public page, skip the check
  if (publicPages.includes(currentPage)) {
    return;
  }
  
  // If not logged in, redirect to auth page
  if (!isLoggedIn) {
    // Save the page they were trying to access
    sessionStorage.setItem('chillflix-redirect-after-login', window.location.href);
    window.location.href = 'auth.html';
  }
})();
    const TMDB_API_KEY = 'c619fb205a80d8c6c653895b7eae6f36';
    const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
    const TMDB_IMAGE_BASE = 'https://image.tmdb.org/t/p/';
    const POSTER_SIZE = 'w185';

    let isDark = true;
    let sidebarExpanded = false;

    const html = document.documentElement;
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const themeToggle = document.getElementById('themeToggle');
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const historyList = document.getElementById('historyList');
    const historyCount = document.getElementById('historyCount');
    const profileInitials = document.getElementById('profileInitials');

    function getProfile() {
      const saved = localStorage.getItem('chillflix-profile');
      return saved ? JSON.parse(saved) : { displayName: 'John Doe', email: 'john.doe@example.com' };
    }
    function updateProfileUI() {
      const profile = getProfile();
      profileInitials.textContent = profile.displayName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
    }

    function applyTheme(dark) {
      isDark = dark;
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      themeToggle.innerHTML = dark 
        ? '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
        : '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      localStorage.setItem('chillflix-theme', dark ? 'dark' : 'light');
    }
    themeToggle.addEventListener('click', () => applyTheme(!isDark));

    function openSidebar() {
      sidebarExpanded = true;
      sidebar.classList.add('expanded');
      overlay.classList.add('visible');
      requestAnimationFrame(() => overlay.classList.add('faded'));
    }
    function closeSidebar() {
      if (!sidebarExpanded) return;
      sidebarExpanded = false;
      sidebar.classList.remove('expanded');
      overlay.classList.remove('faded');
      setTimeout(() => overlay.classList.remove('visible'), 300);
    }
    function toggleSidebar() { sidebarExpanded ? closeSidebar() : openSidebar(); }

    hamburgerBtn.addEventListener('click', toggleSidebar);
    overlay.addEventListener('click', closeSidebar);
    document.querySelectorAll('.sidebar-item').forEach(item => item.addEventListener('click', () => setTimeout(closeSidebar, 100)));
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    function getHistory() {
      return JSON.parse(localStorage.getItem('chillflix-history') || '[]');
    }
    function saveHistory(history) {
      localStorage.setItem('chillflix-history', JSON.stringify(history));
    }
    function removeFromHistory(movieId) {
      const history = getHistory().filter(item => item.movieId !== movieId);
      saveHistory(history);
      showToast('Removed from history');
      loadHistory();
    }
    function clearHistory() {
      if (getHistory().length === 0) { showToast('History is already empty'); return; }
      if (confirm('Remove all movies from your watch history?')) {
        saveHistory([]);
        showToast('History cleared');
        loadHistory();
      }
    }

    async function fetchFromTMDB(endpoint, params = {}) {
      const url = new URL(`${TMDB_BASE_URL}${endpoint}`);
      url.searchParams.append('api_key', TMDB_API_KEY);
      Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v));
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`TMDB error: ${response.status}`);
        return await response.json();
      } catch (e) { console.error('Fetch failed:', e); return null; }
    }
    async function fetchMovieDetails(movieId) {
      return await fetchFromTMDB(`/movie/${movieId}`, { language: 'en-US' });
    }
    function getImageUrl(path) {
      return path ? `${TMDB_IMAGE_BASE}${POSTER_SIZE}${path}` : '';
    }

    function groupByDate(history) {
      const groups = {};
      history.forEach(item => {
        const date = new Date(item.timestamp).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        if (!groups[date]) groups[date] = [];
        groups[date].push(item);
      });
      return groups;
    }

    function getTimeAgo(timestamp) {
      const seconds = Math.floor((new Date() - new Date(timestamp)) / 1000);
      if (seconds < 60) return 'Just now';
      if (seconds < 3600) return `${Math.floor(seconds / 60)} min ago`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)} hours ago`;
      return `${Math.floor(seconds / 86400)} days ago`;
    }

    async function loadHistory() {
      const history = getHistory().sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      historyCount.textContent = `${history.length} movie${history.length !== 1 ? 's' : ''}`;

      if (history.length === 0) {
        historyList.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <h3>No watch history</h3>
            <p>Movies you watch will appear here</p>
            <a href="movies.html" class="browse-btn">Browse Movies</a>
          </div>
        `;
        return;
      }

      const groups = groupByDate(history);
      let html = '';

      for (const [date, items] of Object.entries(groups)) {
        const itemsHtml = await Promise.all(items.map(async (item) => {
          const movie = await fetchMovieDetails(item.movieId);
          if (!movie) return '';
          const posterUrl = getImageUrl(movie.poster_path);
          const progressPercent = movie.runtime ? (item.progress / (movie.runtime * 60)) * 100 : 0;
          const rating = item.rating || null;

          return `
            <a href="movie.html?id=${movie.id}" class="history-item">
              <div class="history-poster">
                ${posterUrl ? `<img src="${posterUrl}" alt="${movie.title}">` : ''}
              </div>
              <div class="history-info">
                <div class="history-title">${movie.title}</div>
                <div class="history-meta">
                  <span>${movie.release_date ? movie.release_date.substring(0, 4) : 'TBD'}</span>
                  ${item.progress > 0 ? `
                    <div class="history-progress">
                      <span>${Math.floor(item.progress / 60)}m watched</span>
                      <div class="progress-bar-small">
                        <div class="progress-fill-small" style="width: ${progressPercent}%;"></div>
                      </div>
                    </div>
                  ` : ''}
                  ${rating ? `
                    <div class="history-rating">
                      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                      ${rating}/10
                    </div>
                  ` : ''}
                  <span>${getTimeAgo(item.timestamp)}</span>
                </div>
              </div>
              <div class="history-actions">
                <button class="history-action-btn" onclick="event.preventDefault(); event.stopPropagation(); removeFromHistory(${movie.id})" title="Remove from history">
                  <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
            </a>
          `;
        }));

        html += `
          <div class="history-group">
            <div class="history-group-header">
              <span class="history-date">${date}</span>
              <span style="color:var(--muted2);font-size:12px;">${items.length} movie${items.length !== 1 ? 's' : ''}</span>
            </div>
            <div class="history-items">
              ${(await Promise.all(itemsHtml)).join('')}
            </div>
          </div>
        `;
      }

      historyList.innerHTML = html;
    }

    (async function init() {
      const savedTheme = localStorage.getItem('chillflix-theme');
      applyTheme(savedTheme ? savedTheme === 'dark' : true);
      updateProfileUI();
      if (!localStorage.getItem('chillflix-profile')) {
        localStorage.setItem('chillflix-profile', JSON.stringify({ displayName: 'John Doe', email: 'john.doe@example.com' }));
      }
      await loadHistory();
    })();
  </script>
</body>
</html>
