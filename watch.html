    function closeModal(e) { if (!e || e.target.classList.contains('modal-overlay')) document.getElementById('upgradeModal').classList.remove('show'); }
    function handlePremiumFeature(feature) { if (isPremium) showToast(`✅ ${feature} activated (Premium)`); else showUpgradeModal(feature); }
    async function fetchFromTMDB(endpoint, params = {}) { const url = new URL(`${TMDB_BASE_URL}${endpoint}`); url.searchParams.append('api_key', TMDB_API_KEY); Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v)); try { const r = await fetch(url); if (!r.ok) throw new Error(`TMDB error: ${r.status}`); return await r.json(); } catch (e) { console.error('Fetch failed:', e); return null; } }
    async function loadMovieData() { const data = await fetchFromTMDB(`/movie/${movieId}`, { language: 'en-US' }); if (!data) { showToast('Failed to load movie data', true); return; } movieData = data; document.getElementById('movieTitleTop').textContent = data.title; document.getElementById('movieStripTitle').textContent = data.title; const year = data.release_date ? data.release_date.substring(0, 4) : 'TBD'; document.getElementById('movieYearTop').textContent = year; document.getElementById('movieRatingTop').innerHTML = `<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> ${data.vote_average.toFixed(1)}`; const hours = Math.floor(data.runtime / 60), mins = data.runtime % 60, genres = data.genres.map(g => g.name).join(' · '); document.getElementById('movieStripMeta').textContent = `${year} · ${hours}h ${mins}m · ${genres}`; await loadTrailer(); }
    async function loadTrailer() { const data = await fetchFromTMDB(`/movie/${movieId}/videos`, { language: 'en-US' }); if (data && data.results) { const trailer = data.results.find(v => v.type === 'Trailer' && v.site === 'YouTube'); if (trailer) trailerKey = trailer.key; } if (!trailerKey) { trailerKey = DEFAULT_TRAILER; showToast('Trailer not available. Playing sample instead.'); } initYouTubePlayer(); }
    function initYouTubePlayer() { if (player) { player.destroy(); player = null; } playerReady = false; playerLoader.style.display = 'block'; if (!window.YT) { const tag = document.createElement('script'); tag.src = 'https://www.youtube.com/iframe_api'; const firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag); window.onYouTubeIframeAPIReady = () => createPlayer(); } else { createPlayer(); } }
    function createPlayer() { try { player = new YT.Player('youtubePlayer', { videoId: trailerKey, playerVars: { autoplay: 0, controls: 0, modestbranding: 1, rel: 0, showinfo: 0, iv_load_policy: 3, fs: 0, playsinline: 1, origin: window.location.origin }, events: { onReady: onPlayerReady, onStateChange: onPlayerStateChange, onError: onPlayerError } }); } catch (e) { console.error('Player creation error:', e); playerLoader.style.display = 'none'; showToast('Failed to load player. Please refresh.', true); } }
    function onPlayerError(event) { console.error('YouTube player error:', event.data); playerLoader.style.display = 'none'; if (trailerKey !== DEFAULT_TRAILER) { trailerKey = DEFAULT_TRAILER; initYouTubePlayer(); } else { showToast('Video player error. Please try another movie.', true); } }
    function onPlayerReady(event) { playerReady = true; playerLoader.style.display = 'none'; centerPlayBtn.style.display = 'flex'; const duration = player.getDuration(); if (duration > 0) durationEl.textContent = formatTime(duration); setInterval(updateProgress, 100); }
    function onPlayerStateChange(event) { const isPlaying = event.data === YT.PlayerState.PLAYING; updatePlayPauseIcon(isPlaying); if (isPlaying) { centerPlayBtn.style.display = 'none'; startIdleTimer(); if (!hasLoggedHistory && movieId && movieData) { logToHistory('watch', movieId, { progress: Math.floor(player.getCurrentTime()), title: movieData.title }); hasLoggedHistory = true; } } else { centerPlayBtn.style.display = 'flex'; playerOverlay.classList.remove('idle'); } }
    function updatePlayPauseIcon(playing) { playPauseBtn.innerHTML = playing ? '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>' : '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>'; }
    function togglePlay() { if (!playerReady || !player) return; try { player.getPlayerState() === YT.PlayerState.PLAYING ? player.pauseVideo() : player.playVideo(); } catch (e) { console.error('Play/pause error:', e); } }
    function seekVideo(seconds) { if (!playerReady || !player) return; try { const currentTime = player.getCurrentTime(); player.seekTo(currentTime + seconds, true); showToast(seconds > 0 ? `+${seconds}s` : `${seconds}s`); } catch (e) { console.error('Seek error:', e); } }
    function updateProgress() { if (!playerReady || !player) return; try { const currentTime = player.getCurrentTime(), duration = player.getDuration(); if (currentTime && duration) { currentTimeEl.textContent = formatTime(currentTime); if (duration > 0) progressBar.style.width = (currentTime / duration) * 100 + '%'; } } catch (e) {} }
    function formatTime(seconds) { if (isNaN(seconds) || seconds < 0) return '0:00'; const mins = Math.floor(seconds / 60), secs = Math.floor(seconds % 60); return `${mins}:${secs.toString().padStart(2, '0')}`; }
    playPauseBtn.addEventListener('click', togglePlay); centerPlayBtn.addEventListener('click', togglePlay);
    progressBarWrapper.addEventListener('click', (e) => { if (!playerReady || !player) return; try { const rect = progressBarWrapper.getBoundingClientRect(); player.seekTo(((e.clientX - rect.left) / rect.width) * player.getDuration(), true); } catch (err) {} });
    const muteBtn = document.getElementById('muteBtn'), volumeSlider = document.getElementById('volumeSlider'), volumeFill = document.getElementById('volumeFill'); let isMuted = false;
    muteBtn.addEventListener('click', () => { if (!playerReady || !player) return; isMuted = !isMuted; if (isMuted) { player.setVolume(0); volumeFill.style.width = '0%'; muteBtn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>'; } else { player.setVolume(100); volumeFill.style.width = '100%'; muteBtn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>'; } });
    volumeSlider.addEventListener('click', (e) => { if (!playerReady || !player) return; const rect = volumeSlider.getBoundingClientRect(), percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)); player.setVolume(Math.round(percent * 100)); volumeFill.style.width = (percent * 100) + '%'; isMuted = percent === 0; });
    document.getElementById('fullscreenBtn').addEventListener('click', () => { const container = document.querySelector('.player-container'); document.fullscreenElement ? document.exitFullscreen() : container.requestFullscreen(); });
    function startIdleTimer() { clearTimeout(idleTimer); playerOverlay.classList.remove('idle'); idleTimer = setTimeout(() => { if (player && player.getPlayerState() === YT.PlayerState.PLAYING) playerOverlay.classList.add('idle'); }, 3000); }
    playerOverlay.addEventListener('mousemove', startIdleTimer); playerOverlay.addEventListener('click', () => { if (playerOverlay.classList.contains('idle')) startIdleTimer(); });
    let lastTap = 0; playerOverlay.addEventListener('touchend', (e) => { const currentTime = new Date().getTime(), tapLength = currentTime - lastTap; if (tapLength < 300 && tapLength > 0) { const rect = playerOverlay.getBoundingClientRect(), x = e.changedTouches[0].clientX - rect.left; if (x < rect.width / 3) seekVideo(-10); else if (x > rect.width * 2/3) seekVideo(10); e.preventDefault(); } lastTap = currentTime; });
    document.addEventListener('keydown', (e) => { if (!playerReady) return; switch(e.code) { case 'Space': e.preventDefault(); togglePlay(); break; case 'ArrowLeft': seekVideo(-5); break; case 'ArrowRight': seekVideo(5); break; case 'KeyF': document.querySelector('.player-container').requestFullscreen(); break; case 'KeyM': muteBtn.click(); break; } });
    (async function init() { const savedTheme = localStorage.getItem('chillflix-theme'); applyTheme(savedTheme ? savedTheme === 'dark' : true); updateProfileUI(); await loadMovieData(); })();
  </script>
